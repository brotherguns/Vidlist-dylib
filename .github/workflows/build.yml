name: Build VLCrawler Dylib

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install dependencies
        run: brew install ldid dpkg

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: git clone --recursive https://github.com/theos/theos.git $THEOS
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Set up iOS SDK
        run: |
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "Using Xcode SDK: $XCODE_SDK (iOS $SDK_VERSION)"
          mkdir -p $THEOS/sdks
          ln -sfn "$XCODE_SDK" "$THEOS/sdks/iPhoneOS${SDK_VERSION}.sdk"
          echo "SDK_VERSION=$SDK_VERSION" >> $GITHUB_ENV
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build
        run: |
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_DEVICE_IP: ""
          SDKVERSION: ${{ env.SDK_VERSION }}

      - name: Extract dylib from deb
        run: |
          DEB=$(ls packages/*.deb | head -1)
          echo "Built: $DEB"
          mkdir -p artifacts
          dpkg-deb -x "$DEB" artifacts/extracted/
          cp artifacts/extracted/Library/MobileSubstrate/DynamicLibraries/VLCrawler.dylib artifacts/
          cp "$DEB" artifacts/

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: VLCrawler-dylib
          path: artifacts/VLCrawler.dylib
          retention-days: 30

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: VLCrawler-deb
          path: artifacts/*.deb
          retention-days: 30
